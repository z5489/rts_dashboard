name: RTS Data Pipeline

on:
  schedule:
    # Run weeknights (Monday - Friday) at 23:00 UTC (after US market close)
    - cron: '0 23 * * 1-5'
  workflow_dispatch: # Allows manual trigger from Actions tab
    inputs:
      date:
        description: 'Date in YYYYMMDD format (leave blank for current UTC date)'
        required: false
        default: ''

permissions:
  contents: write # Required for git push

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      run_date: ${{ steps.set-date.outputs.run_date }}
    steps:
      - id: set-date
        run: |
          INPUT_DATE="${{ github.event.inputs.date }}"
          if [ -n "$INPUT_DATE" ]; then
            echo "run_date=$INPUT_DATE" >> $GITHUB_OUTPUT
          else
            echo "run_date=$(date -u +%Y%m%d)" >> $GITHUB_OUTPUT
          fi

  fetch-batches:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Do not cancel other batches if one fails
      matrix:
        batch: ["01", "02", "03", "04", "05", "06"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Fetch and Enrich Batch ${{ matrix.batch }}
        run: |
          python scripts/fetch_batch.py --batch data/batches/batch_${{ matrix.batch }}.csv --date ${{ needs.setup.outputs.run_date }}

      - name: Upload Enriched Batch Artifact
        uses: actions/upload-artifact@v4
        with:
          name: enriched-batch-${{ matrix.batch }}
          path: data/batches/${{ needs.setup.outputs.run_date }}/batch_${{ matrix.batch }}_${{ needs.setup.outputs.run_date }}_enriched.csv
          retention-days: 1

  merge-results:
    needs: [setup, fetch-batches]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for proper git pushing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Download all enriched batches
        uses: actions/download-artifact@v4
        with:
          path: data/batches/temp_enriched/

      - name: Align downloaded artifacts to daily directory
        run: |
          mkdir -p data/batches/${{ needs.setup.outputs.run_date }}
          find data/batches/temp_enriched/ -name "*.csv" -exec mv {} data/batches/${{ needs.setup.outputs.run_date }}/ \;
          rm -rf data/batches/temp_enriched/

      - name: Run Merge and manifest update
        run: |
          python scripts/merge.py --date ${{ needs.setup.outputs.run_date }}

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: RTS data update ${{ needs.setup.outputs.run_date }}" && git push)
